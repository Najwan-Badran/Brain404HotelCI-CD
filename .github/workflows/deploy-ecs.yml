name: CI/CD — Build, Push & Deploy to ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION:             us-east-1
  ECR_REPOSITORY:         hotel-backend
  ECS_CLUSTER:            hotel-cluster
  ECS_SERVICE:            hotel-service
  TASK_DEFINITION_FAMILY: hotel-task
  CONTAINER_NAME:         hotel-app
  DB_PASSWORD:            123456
  ALB_HEALTH_URL:         http://hotel-alb-384312504.us-east-1.elb.amazonaws.com/actuator/health
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Run unit tests (H2 in-memory, no real DB needed)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run tests (H2 profile)
        run: ./mvnw test -Dspring.profiles.active=test --batch-mode

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Build JAR → Docker image → push to ECR → deploy to ECS
# ─────────────────────────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build JAR (tests already passed)
        run: ./mvnw package -DskipTests --batch-mode

      # ── AWS auth ────────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Docker image ────────────────────────────────────────────────────────
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker tag  "$IMAGE_URI" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$IMAGE_URI"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      # ── ECS deploy ──────────────────────────────────────────────────────────
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.TASK_DEFINITION_FAMILY }} \
            --query taskDefinition \
            > task-definition.json

      - name: Set ECS DB password environment variable
        run: |
          jq --arg container "$CONTAINER_NAME" --arg db_password "$DB_PASSWORD" '
            .containerDefinitions |= map(
              if .name == $container then
                .environment = ((.environment // []) | map(select(.name != "DB_PASSWORD")) + [{"name":"DB_PASSWORD","value":$db_password}])
              else . end
            )
          ' task-definition.json > task-definition.updated.json
          mv task-definition.updated.json task-definition.json

      - name: Render updated task definition (new image)
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      - name: Deploy task definition to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.render-task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Smoke test: confirm /actuator/health returns 200
# ─────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: Wait for ALB to route to new task
        run: sleep 20

      - name: GET /actuator/health — expect HTTP 200
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.ALB_HEALTH_URL }}")
          echo "Response status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Smoke test FAILED — expected 200, got $HTTP_STATUS"
            exit 1
          fi
          echo "Smoke test PASSED"
